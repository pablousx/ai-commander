name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine Next Semver
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          initial_version: 0.1.0

      - name: Generate Changelog Release Notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Single-File Executable
        run: >
          dotnet publish src/AICommander.App/AICommander.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:BUILD_VERSION=${{ steps.tag.outputs.new_version }}
          --output publish/

      - name: Package Release
        run: |
          Compress-Archive -Path "publish/AICommander.App.exe", "config/ai-commander.yaml", "README.md" -DestinationPath "AICommander-${{ steps.tag.outputs.new_tag }}-win-x64.zip"

      - name: Push Git Tag
        run: |
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit CHANGELOG.md
        run: |
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md for ${{ steps.tag.outputs.new_tag }} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: AI Commander ${{ steps.tag.outputs.new_tag }}
          body_path: RELEASE_NOTES.md
          files: AICommander-${{ steps.tag.outputs.new_tag }}-win-x64.zip
          generate_release_notes: false
