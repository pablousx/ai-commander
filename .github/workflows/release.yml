name: Release desktop app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Read is the safe default. Only the bundle job receives permission to create
# the draft GitHub Release and upload its assets.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release:
    name: Verify release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Ensure the tag is a semantic version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          printf '%s' "$RELEASE_TAG" | grep --extended-regexp --quiet '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' || {
            echo "Expected a semantic tag such as v1.2.3, received $RELEASE_TAG." >&2
            exit 1
          }

  bundle:
    name: Bundle (${{ matrix.name }})
    needs: verify-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            args: ""
            install-linux-dependencies: true
          - name: macOS universal
            os: macos-14
            args: --target universal-apple-darwin
            install-linux-dependencies: false
          - name: Windows
            os: windows-2025
            args: ""
            install-linux-dependencies: false

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master at 2026-07-24
        with:
          toolchain: 1.85.0
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Install Linux native dependencies
        if: matrix.install-linux-dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdotool

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Synchronize application version with tag
        run: node scripts/sync-version.ts "${{ github.ref_name }}"

      - name: Build bundles and create draft release
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm exec tauri
          tagName: ${{ github.ref_name }}
          releaseName: "AI Commander v__VERSION__"
          releaseBody: "Install the package for your operating system from the assets below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
