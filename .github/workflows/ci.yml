name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore local tools
        run: dotnet tool restore

      - name: Validate PR Commits
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          $head = "${{ github.event.pull_request.head.sha }}"
          $commits = git rev-list --no-merges "$base..$head"
          if (-not $commits) {
            Write-Host "No non-merge commits to validate."
            exit 0
          }
          foreach ($sha in $commits) {
            Write-Host "Linting commit $sha"
            git log -1 --format=%B $sha | Out-File -Encoding utf8NoBOM commit_msg.txt
            dotnet commit-lint --commit-file commit_msg.txt --commit-message-config-file commit-message-config.json
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Verify formatting
        run: dotnet format AICommander.sln --verify-no-changes --severity error

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore AICommander.sln

      - name: Build
        run: dotnet build AICommander.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test AICommander.sln --no-build --configuration Release --logger trx --results-directory TestResults/

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults
          path: TestResults/*.trx
