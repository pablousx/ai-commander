version: 2
provider_priority:
  - antigravity
  - Notepad
  - vscode
providers:
  antigravity:
    enabled: true
    process_name: Antigravity IDE.exe
    process_names:
      windows: Antigravity IDE.exe
      macos: Antigravity
      linux: antigravity
    icon: antigravity.png
    actions:
      accept:
        key_sequence:
          - Ctrl
          - T
      reject:
        key_sequence:
          - Escape
  Notepad:
    enabled: true
    process_name: Notepad.exe
    process_names:
      windows: Notepad.exe
      macos: TextEdit
      linux: gedit
    icon: logo.png
    actions:
      "no":
        key_sequence:
          - Ctrl
          - T
  vscode:
    enabled: true
    process_name: Code.exe
    process_names:
      windows: Code.exe
      macos: Visual Studio Code
      linux: code
    icon: vscode.png
    actions:
      accept:
        key_sequence:
          - Ctrl
          - T
      inline_chat:
        key_sequence:
          - Ctrl
          - I
hotkeys:
  Ctrl+Shift+BracketRight: accept
  Ctrl+Shift+P: "no"
  Ctrl+Shift+BracketLeft: accept
settings:
  auto_start_on_boot: true
  show_tray_icon: true
  show_action_notifications: true
